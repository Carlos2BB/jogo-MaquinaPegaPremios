<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Ultimate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700;
            padding: 10px 20px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
        }
        #luck-timer {
            display: none; background: rgba(0, 255, 0, 0.9); color: black; font-weight: bold;
            padding: 10px 20px; border-radius: 15px; margin-top: 15px;
            border: 2px solid white; font-size: 20px;
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { padding: 15px 30px; font-size: 22px; cursor: pointer; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700; font-size: 48px;">ARCADE PARK</h1>
        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">PRÊMIOS: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
        </div>
        <div id="luck-timer">SORTE ATIVA: <span id="luck-val">30.0</span>s</div>
        <div id="prompt">Pressione [E] na Máquina</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0; line-height: 1.6;">
            <li>Setas: Mover Garra</li>
            <li>Mouse: Olhar para Lados</li>
            <li>Espaço: Tentar Pescar</li>
            <li>ESC: Sair da Máquina</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // CÉU E LUZ
    const skyGeo = new THREE.SphereGeometry(450, 32, 15);
    const skyMat = new THREE.ShaderMaterial({ 
        vertexShader: `varying vec3 vWorldPosition; void main() { vec4 worldPosition = modelMatrix * vec4( position, 1.0 ); vWorldPosition = worldPosition.xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 ); }`, 
        fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor; varying vec3 vWorldPosition; void main() { float h = normalize( vWorldPosition ).y; gl_FragColor = vec4( mix( bottomColor, topColor, max( h, 0.0 ) ), 1.0 ); }`,
        uniforms: { topColor: { value: new THREE.Color(0x00aaff) }, bottomColor: { value: new THREE.Color(0xffffff) } },
        side: THREE.BackSide 
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(50, 100, 50);
    scene.add(sun, new THREE.AmbientLight(0xffffff, 0.7));

    // CHÃO E ÁRVORES
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x348C31 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const leafMat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 }, color: { value: new THREE.Color(0x2E7D32) } },
        vertexShader: `uniform float time; void main() { vec3 pos = position; pos.x += sin(time + position.y) * 0.15; gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0); }`,
        fragmentShader: `uniform vec3 color; void main() { gl_FragColor = vec4(color, 1.0); }`
    });

    for(let i=0; i<50; i++) {
        const x = Math.random() * 200 - 100, z = Math.random() * 200 - 100;
        if (Math.abs(x) > 12 || Math.abs(z) > 15) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4), new THREE.MeshStandardMaterial({color:0x5D4037}));
            trunk.position.y = 2; tree.add(trunk);
            const foliage = new THREE.Mesh(new THREE.DodecahedronGeometry(2), leafMat);
            foliage.position.y = 4.5; tree.add(foliage);
            tree.position.set(x, 0, z); scene.add(tree);
        }
    }

    // MÁQUINA (COMPLETA)
    const machine = new THREE.Group();
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(4, 1.8, 4), new THREE.MeshStandardMaterial({color:0xcc0000}));
    mBase.position.y = 0.9; machine.add(mBase);

    const mGlass = new THREE.Mesh(new THREE.BoxGeometry(3.8, 4, 3.8), new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:0.2}));
    mGlass.position.y = 3.8; machine.add(mGlass);

    // Painel de Controle
    const panel = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 1), new THREE.MeshStandardMaterial({color: 0x222}));
    panel.position.set(0, 1.6, 2.2); machine.add(panel);

    const joystick = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6), new THREE.MeshStandardMaterial({color: 0x888}));
    joystick.position.set(-0.6, 2, 2.2); machine.add(joystick);

    const buttonM = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0xff0000}));
    buttonM.position.set(0.6, 1.85, 2.2); machine.add(buttonM);

    // Garra
    const clawSystem = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 4), new THREE.MeshStandardMaterial({color:0x333}));
    cable.position.y = 2; clawSystem.add(cable);
    
    const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group();
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshStandardMaterial({color:0xaaa}));
        pMesh.position.y = -0.3; pMesh.position.z = 0.2;
        pPivot.add(pMesh); pPivot.rotation.y = (Math.PI*2/3)*i;
        clawSystem.add(pPivot); pinchers.push(pPivot);
    }
    clawSystem.position.set(0, 5.5, 0); machine.add(clawSystem);

    const prizes = [];
    for(let i=0; i<10; i++){
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
        p.position.set(Math.random()*2.8-1.4, 1.9, Math.random()*2.8-1.4);
        machine.add(p); prizes.push(p);
    }
    machine.position.set(0, 0, -12); scene.add(machine);

    // PARKOUR E MOEDAS
    const allPlatforms = [];
    function createPlat(x,y,z,w,d) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(w,0.8,d), new THREE.MeshStandardMaterial({color:0xff4400}));
        p.position.set(x,y,z); scene.add(p); allPlatforms.push(p);
    }
    createPlat(50, 0.5, -30, 6, 6); createPlat(50, 2.5, -36, 3, 3); createPlat(55, 4.5, -36, 3, 3);
    createPlat(55, 6.5, -42, 4, 4); createPlat(50, 8.5, -42, 6, 6);
    
    const potion = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.8), new THREE.MeshStandardMaterial({color: 0x00ff00, emissive: 0x00ff00}));
    potion.position.set(50, 10, -42); scene.add(potion);

    const coins = [];
    for(let i=0; i<20; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02), new THREE.MeshStandardMaterial({color:0xffd700}));
        c.position.set(Math.random()*60-30, 0.2, Math.random()*60-30);
        c.rotation.x = Math.PI/2; scene.add(c); coins.push(c);
    }

    // LÓGICA
    let gameState = "SETUP", coinsCount = 0, prizesLeft = 10;
    let yaw = 0, pitch = 0, velocityY = 0, canJump = true, clawYaw = 0;
    let luckTime = 0, isLuckActive = false, isClawMoving = false, clawOpen = 1;
    let startTime = 0;

    window.startGame = () => { document.getElementById('setup-screen').style.display = 'none'; gameState = "WALK"; startTime = Date.now(); };

    document.addEventListener('mousemove', (e) => {
        if (!document.pointerLockElement) return;
        if(gameState === "WALK") {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        } else if(gameState === "CLAW") {
            clawYaw -= e.movementX * 0.0015;
            clawYaw = Math.max(-0.7, Math.min(0.7, clawYaw));
            camera.rotation.y = Math.PI + clawYaw;
        }
    });

    function startFishing() {
        if(isClawMoving) return;
        isClawMoving = true; let stage = "DOWN", caught = [];
        const interval = setInterval(() => {
            if(stage === "DOWN") { clawSystem.position.y -= 0.04; if(clawSystem.position.y <= 2.5) stage = "GRAB"; }
            else if(stage === "GRAB") { 
                clawOpen -= 0.1; 
                if(clawOpen <= 0) {
                    prizes.forEach(p => { if(p.visible && p.position.distanceTo(new THREE.Vector3(clawSystem.position.x, 1.9, clawSystem.position.z + machine.position.z)) < 0.7) caught.push(p); });
                    stage = "UP";
                }
            }
            else if(stage === "UP") { 
                clawSystem.position.y += 0.04; 
                caught.forEach(p => p.position.y = clawSystem.position.y - 0.5);
                if(clawSystem.position.y >= 5.5) stage = "RESET"; 
            }
            else { 
                caught.forEach(p => { p.visible = false; prizesLeft--; });
                document.getElementById('prizes-val').innerText = prizesLeft;
                coinsCount--; document.getElementById('coin-val').innerText = coinsCount;
                clawOpen = 1; isClawMoving = false; clearInterval(interval);
                if(coinsCount <= 0) { gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0,1.7,-6); }
            }
        }, 20);
    }

    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyE') {
            coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
            if(potion.visible && camera.position.distanceTo(potion.position) < 3) { potion.visible = false; isLuckActive = true; luckTime = 30; document.getElementById('luck-timer').style.display = 'block'; }
            if(gameState === "WALK" && camera.position.distanceTo(machine.position) < 5 && coinsCount > 0) {
                gameState = "CLAW"; document.getElementById('game-info').style.display = 'block';
                camera.position.set(0, 4.2, -7.5); camera.rotation.set(-0.2, Math.PI, 0); clawYaw = 0;
            }
        }
        if(gameState === "CLAW" && !isClawMoving) {
            if(e.code === 'ArrowLeft' && clawSystem.position.x > -1.5) clawSystem.position.x -= 0.1;
            if(e.code === 'ArrowRight' && clawSystem.position.x < 1.5) clawSystem.position.x += 0.1;
            if(e.code === 'ArrowUp' && clawSystem.position.z > -1.5) clawSystem.position.z -= 0.1;
            if(e.code === 'ArrowDown' && clawSystem.position.z < 1.5) clawSystem.position.z += 0.1;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') { gameState = "WALK"; document.getElementById('game-info').style.display = 'none'; camera.position.set(0,1.7,-6); yaw=0; pitch=0; }
        }
        if(gameState === "WALK" && e.code === 'Space' && canJump) { velocityY = 0.22; canJump = false; }
    });

    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('mousedown', () => document.body.requestPointerLock());

    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now() * 0.001;
        leafMat.uniforms.time.value = time;

        if(gameState === "WALK") {
            velocityY -= 0.009; camera.position.y += velocityY;
            allPlatforms.forEach(p => {
                if(Math.abs(camera.position.x - p.position.x) < p.geometry.parameters.width/2 && Math.abs(camera.position.z - p.position.z) < p.geometry.parameters.depth/2 && camera.position.y > p.position.y + 1.2 && camera.position.y < p.position.y + 1.8) {
                    camera.position.y = p.position.y + 1.7; velocityY = 0; canJump = true;
                }
            });
            if(camera.position.y <= 1.7) { camera.position.y = 1.7; velocityY = 0; canJump = true; }
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if(keys['KeyW']) camera.position.addScaledVector(dir, 0.15); if(keys['KeyS']) camera.position.addScaledVector(dir, -0.15);
            if(keys['KeyA']) camera.position.addScaledVector(side, 0.15); if(keys['KeyD']) camera.position.addScaledVector(side, -0.15);
        }

        if(isLuckActive) { luckTime -= 0.016; document.getElementById('luck-val').innerText = Math.max(0, luckTime).toFixed(1); if(luckTime <= 0) { isLuckActive = false; document.getElementById('luck-timer').style.display = 'none'; }}
        if(gameState !== "SETUP") document.getElementById('timer-val').innerText = ((Date.now() - startTime) / 1000).toFixed(1);
        pinchers.forEach(p => p.rotation.x = 0.8 * (1 - clawOpen));

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
