<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Day/Night & Admin Chat</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: rgba(255,255,255,0.7);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.85); color: #ffd700;
            padding: 10px 25px; border-radius: 30px;
            font-size: 18px; border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        #prompt {
            color: white; font-size: 24px; font-weight: bold;
            background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 15px;
            display: none; border-bottom: 4px solid #ffd700;
        }
        #setup-screen, #end-screen {
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #end-screen { display: none; z-index: 101; color: white; }
        input { padding: 12px; font-size: 20px; border-radius: 8px; border: 2px solid #ffd700; margin: 10px; width: 280px; background: #111; color: white; }
        button { padding: 12px 30px; font-size: 20px; cursor: pointer; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }
        
        /* CHAT STYLE */
        #chat-container {
            position: absolute; bottom: 20px; left: 20px; width: 350px;
            background: rgba(0,0,0,0.6); border-radius: 10px; display: flex; flex-direction: column;
            pointer-events: auto; border: 1px solid rgba(255,255,255,0.2);
        }
        #chat-messages { height: 150px; overflow-y: auto; padding: 10px; color: white; font-size: 14px; display: flex; flex-direction: column-reverse; }
        #chat-input { background: rgba(0,0,0,0.8); border: none; padding: 10px; color: #00ff88; outline: none; border-top: 1px solid #333; display: none; width: calc(100% - 20px); }

        #leaderboard {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85);
            padding: 15px; border-radius: 12px; border: 1px solid #ffd700; color: #fff; font-size: 14px;
        }
        #game-info {
            position: absolute; top: 100px; right: 20px;
            background: rgba(0,0,0,0.9); color: white; padding: 20px;
            border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700; font-size: 48px; letter-spacing: 2px;">ARCADE PARK</h1>
        <input type="number" id="total-players" value="1" min="1" max="10" title="Jogadores">
        <input type="text" id="player-name" placeholder="Seu Nome..." maxlength="15">
        <button onclick="startGame()">INICIAR</button>
    </div>

    <div id="end-screen">
        <h1 id="end-title">FIM DA RODADA</h1>
        <p id="final-stats"></p>
        <p id="winner-announcement"></p>
        <button id="next-player-btn" onclick="prepareNextTurn()">PRÓXIMO</button>
    </div>

    <div id="leaderboard">
        <strong style="color: #ffd700;">RANKING:</strong>
        <div id="score-list"></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Digite [Enter] para enviar...">
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div id="coin-display" class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc;">ITENS: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
        </div>
        <div id="prompt">Pressione [E] para interagir</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">COMANDOS GARRA</h2>
        <ul style="list-style:none; padding:0">
            <li>SETAS: Mover Garra | ESPAÇO: Pegar | ESC: Sair</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 1, 300);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    // --- CICLO DIA E NOITE ---
    let timeScale = 1; // 1x = 10 min por ciclo completo (5 min dia / 5 min noite)
    let dayTime = 0; 
    const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    scene.add(sunLight);

    const moonLight = new THREE.DirectionalLight(0x4444ff, 0.5);
    scene.add(moonLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientLight);

    const skyBox = new THREE.Mesh(new THREE.SphereGeometry(450, 32, 32), new THREE.MeshBasicMaterial({ side: THREE.BackSide }));
    scene.add(skyBox);

    // --- TERRENO E FLORA ---
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2d5a27 }));
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

    function createTree(x, z) {
        const type = Math.random();
        const tree = new THREE.Group();
        let h = 3 + Math.random() * 5;
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, h), new THREE.MeshStandardMaterial({color: 0x3d2b1f}));
        trunk.position.y = h/2; trunk.castShadow = true; tree.add(trunk);
        
        let fol;
        if(type < 0.4) fol = new THREE.Mesh(new THREE.ConeGeometry(2, h, 8), new THREE.MeshStandardMaterial({color: 0x1b4d1c}));
        else fol = new THREE.Mesh(new THREE.DodecahedronGeometry(h/2, 1), new THREE.MeshStandardMaterial({color: 0x225522}));
        fol.position.y = h; fol.castShadow = true; tree.add(fol);
        tree.position.set(x, 0, z); scene.add(tree);
    }
    for(let i=0; i<60; i++) {
        let x = Math.random()*200-100, z = Math.random()*200-100;
        if(Math.abs(x) > 15 || Math.abs(z) > 20) createTree(x, z);
    }

    // --- ANIMAIS DETALHADOS ---
    const animals = [];
    const createAnimal = (type) => {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({color: type === 'rabbit' ? 0xffffff : 0xd35400});
        const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});

        if(type === 'rabbit') {
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), mat);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), mat);
            head.position.set(0, 0.3, 0.2);
            // Olhos e Nariz
            const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.02), eyeMat); e1.position.set(0.08, 0.35, 0.35);
            const e2 = new THREE.Mesh(new THREE.SphereGeometry(0.02), eyeMat); e2.position.set(-0.08, 0.35, 0.35);
            group.add(body, head, e1, e2);
        } else {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 0.4), mat);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), mat);
            head.position.set(0.4, 0.3, 0);
            const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat); e1.position.set(0.5, 0.4, 0.1);
            const e2 = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat); e2.position.set(0.5, 0.4, -0.1);
            const tail = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.5), new THREE.MeshStandardMaterial({color: 0xffffff}));
            tail.position.set(-0.4, 0.3, 0); tail.rotation.z = Math.PI/2;
            group.add(body, head, e1, e2, tail);
        }
        
        group.castShadow = true;
        let rx = Math.random()*160-80, rz = Math.random()*160-80;
        group.position.set(rx, 0, rz);
        scene.add(group);
        animals.push({mesh: group, type, angle: Math.random()*Math.PI*2, state: 'idle', timer: 100});
    };
    for(let i=0; i<3; i++) createAnimal('rabbit');
    for(let i=0; i<2; i++) createAnimal('fox');

    // --- OBJETOS DE JOGO (MOEDAS, MAQUINA, PARKOUR) ---
    const coins = [];
    for(let i=0; i<35; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 0.8}));
        c.position.set(Math.random()*100-50, 0.2, Math.random()*100-50);
        c.rotation.x = Math.PI/2; scene.add(c); coins.push(c);
    }

    // Máquina e Garra (Versão Simplificada conforme a anterior)
    const machine = new THREE.Group();
    const glass = new THREE.Mesh(new THREE.BoxGeometry(3.3, 2.7, 3.3), new THREE.MeshPhysicalMaterial({transparent: true, opacity: 0.2, color: 0xffffff, roughness: 0}));
    glass.position.y = 2.7; machine.add(glass);
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.2, 3.5), new THREE.MeshStandardMaterial({color: 0x880000}));
    mBase.position.y = 0.6; machine.add(mBase);
    machine.position.set(0, 0, -12); scene.add(machine);

    const prizes = [];
    for(let i=0; i<10; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
        p.position.set((Math.random()-0.5)*2.5, 1.5, (Math.random()-0.5)*2.5); machine.add(p); prizes.push(p);
    }

    const claw = new THREE.Group();
    const clawBody = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 3), new THREE.MeshStandardMaterial({color: 0x333333}));
    clawBody.position.y = 1.5; claw.add(clawBody);
    claw.position.set(0, 4, 0); machine.add(claw);

    // --- LÓGICA DE JOGO ---
    let coinsCount = 0, isChatting = false, prizesLeft = 10;
    let gameState = "SETUP", startTime = 0;
    let moveF = 0, moveB = 0, moveL = 0, moveR = 0, yaw = 0, pitch = 0;

    // Chat / ADM System
    const chatIn = document.getElementById('chat-input');
    const chatMsg = document.getElementById('chat-messages');

    function logChat(text, color = "white") {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerText = text;
        chatMsg.prepend(div);
    }

    function handleCommand(cmd) {
        cmd = cmd.toUpperCase().trim();
        if(cmd.startsWith("MOEDAS =")) {
            const val = parseInt(cmd.split("=")[1]);
            if(!isNaN(val)) {
                coinsCount = val;
                document.getElementById('coin-val').innerText = coinsCount;
                logChat(`ADM: Moedas definidas para ${val}`, "#ffd700");
            }
        } else if(cmd.startsWith("TEMPO =")) {
            const val = parseFloat(cmd.split("=")[1]);
            if(!isNaN(val)) {
                timeScale = val;
                logChat(`ADM: Velocidade do tempo: ${val}x`, "#00ffff");
            }
        }
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === "Enter") {
            isChatting = !isChatting;
            chatIn.style.display = isChatting ? "block" : "none";
            if(isChatting) { chatIn.focus(); document.exitPointerLock(); }
            else {
                if(chatIn.value) { handleCommand(chatIn.value); chatIn.value = ""; }
                if(gameState === "WALK") document.body.requestPointerLock();
            }
        }
        if(isChatting) return;
        if(e.code === 'KeyW') moveF = 1; if(e.code === 'KeyS') moveB = 1;
        if(e.code === 'KeyA') moveL = 1; if(e.code === 'KeyD') moveR = 1;
        if(e.code === 'KeyE') interact();
    });
    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveF = 0; if(e.code === 'KeyS') moveB = 0;
        if(e.code === 'KeyA') moveL = 0; if(e.code === 'KeyD') moveR = 0;
    });

    function interact() {
        coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
        if(camera.position.distanceTo(new THREE.Vector3(0,0,-12)) < 5 && coinsCount > 0) {
            gameState = "CLAW"; document.getElementById('game-info').style.display = "block";
            camera.position.set(0, 4, -8); camera.lookAt(0,2,-12);
        }
    }

    window.startGame = () => {
        document.getElementById('setup-screen').style.display = "none";
        gameState = "WALK"; startTime = Date.now();
        document.body.requestPointerLock();
    };

    document.addEventListener('mousemove', (e) => {
        if(document.pointerLockElement && !isChatting) {
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-1.5, Math.min(1.5, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
    });

    function animate() {
        requestAnimationFrame(animate);

        // --- CICLO DIA/NOITE LOGIC ---
        // Ciclo completo em 600 segundos (10 min) na escala 1x
        dayTime += (0.01 * timeScale); 
        const cycle = (dayTime * 0.001); 
        const sunAngle = cycle; 
        
        sunLight.position.set(Math.cos(sunAngle)*100, Math.sin(sunAngle)*100, 50);
        moonLight.position.set(-Math.cos(sunAngle)*100, -Math.sin(sunAngle)*100, 50);

        // Cores do Céu
        const dayIntensity = Math.max(0, Math.sin(sunAngle));
        const nightIntensity = Math.max(0, -Math.sin(sunAngle));
        
        scene.fog.color.setHSL(0.6, 0.5, dayIntensity * 0.5);
        skyBox.material.color.setHSL(0.6, 0.5, dayIntensity * 0.4 + 0.05);
        ambientLight.intensity = 0.1 + dayIntensity * 0.6;
        sunLight.intensity = dayIntensity * 2;
        moonLight.intensity = nightIntensity * 0.5;

        // --- MOVIMENTO ANIMAIS ---
        animals.forEach(a => {
            a.timer--;
            if(a.mesh.position.distanceTo(camera.position) < 8) {
                a.state = 'run'; a.timer = 100;
                const dir = new THREE.Vector3().subVectors(a.mesh.position, camera.position).normalize();
                a.angle = Math.atan2(dir.x, dir.z);
            }
            if(a.timer <= 0) {
                a.state = Math.random() > 0.5 ? 'walk' : 'idle';
                a.timer = 100 + Math.random()*200;
                a.angle = Math.random()*Math.PI*2;
            }
            if(a.state !== 'idle') {
                const spd = a.state === 'run' ? 0.15 : 0.05;
                a.mesh.position.x += Math.sin(a.angle) * spd;
                a.mesh.position.z += Math.cos(a.angle) * spd;
                a.mesh.rotation.y = a.angle + Math.PI;
                if(a.type === 'rabbit') a.mesh.position.y = Math.abs(Math.sin(Date.now()*0.01))*0.2;
            }
        });

        // --- MOVIMENTO PLAYER ---
        if(gameState === "WALK" && !isChatting) {
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if(moveF) camera.position.addScaledVector(dir, 0.15);
            if(moveB) camera.position.addScaledVector(dir, -0.15);
            if(moveL) camera.position.addScaledVector(side, 0.15);
            if(moveR) camera.position.addScaledVector(side, -0.15);
            document.getElementById('timer-val').innerText = ((Date.now() - startTime)/1000).toFixed(1);
        }

        renderer.render(scene, camera);
    }
    animate();

</script>
</body>
</html>
