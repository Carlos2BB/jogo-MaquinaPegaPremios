<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NEON RAIDER: Forge & Survive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            pointer-events: none; user-select: none;
        }
        .panel { background: rgba(0, 0, 0, 0.7); padding: 15px; border-left: 4px solid #00f2ff; margin-bottom: 10px; }
        .craft-menu {
            position: absolute; right: 20px; top: 20px; 
            background: rgba(10, 10, 30, 0.9); padding: 20px; border: 1px solid #00f2ff;
            color: #fff; display: flex; flex-direction: column; gap: 10px;
        }
        button {
            background: #00f2ff; border: none; padding: 8px; cursor: pointer;
            font-weight: bold; transition: 0.3s; pointer-events: auto;
        }
        button:hover { background: #ff00ff; color: #fff; }
        button:disabled { background: #333; cursor: not-allowed; }
        #msg { position: absolute; bottom: 50px; width: 100%; text-align: center; color: #ff00ff; font-size: 20px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="panel">
        <div style="font-size: 24px; color: #00f2ff;">NEON RAIDER</div>
        <div>Integridade: <span id="hp">100</span>%</div>
        <div>Núcleos: <span id="cores">0</span></div>
    </div>
    <div id="weapon-stats">
        Arma: <span id="w-name">Punhal de Bits</span><br>
        Dano: <span id="w-dmg">5</span>
    </div>
</div>

<div class="craft-menu" id="menu">
    <div style="text-align: center; border-bottom: 1px solid #555; padding-bottom: 5px;">FORJA DE ARMAS</div>
    <button onclick="upgradeWeapon(10, 'Espada Laser', 15, 0x00ff00)">Forjar Espada (10 Núcleos)</button>
    <button onclick="upgradeWeapon(30, 'Machado de Plasma', 40, 0xffaa00)">Forjar Machado (30 Núcleos)</button>
    <button onclick="upgradeWeapon(70, 'Lâmina do Caos', 100, 0xff0000)">Lâmina do Caos (70 Núcleos)</button>
</div>

<div id="msg"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // SETUP CENA
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 60);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ILUMINAÇÃO
    const ambient = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambient);
    const pointLight = new THREE.PointLight(0x00f2ff, 2, 20);
    scene.add(pointLight);

    // MUNDO (Chão infinito visualmente)
    const grid = new THREE.GridHelper(200, 40, 0x00f2ff, 0x111111);
    scene.add(grid);

    // JOGADOR
    const player = new THREE.Group();
    const playerBody = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.5, 1, 4, 8),
        new THREE.MeshStandardMaterial({ color: 0x00f2ff })
    );
    player.add(playerBody);
    scene.add(player);

    // ARMA VISUAL
    let swordGeo = new THREE.BoxGeometry(0.1, 1.5, 0.1);
    let swordMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff });
    let sword = new THREE.Mesh(swordGeo, swordMat);
    sword.position.set(0.7, 0, -0.5);
    sword.rotation.x = Math.PI/2;
    player.add(sword);

    // ESTADO DO JOGO
    let gameState = {
        hp: 100, cores: 0, damage: 5,
        weaponName: "Punhal de Bits",
        pos: { x: 0, z: 0 },
        enemies: [],
        particles: []
    };

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    // SISTEMA DE CRAFTING (Global para os botões)
    window.upgradeWeapon = (cost, name, dmg, color) => {
        if(gameState.cores >= cost) {
            gameState.cores -= cost;
            gameState.damage = dmg;
            gameState.weaponName = name;
            sword.material.color.setHex(color);
            sword.material.emissive.setHex(color);
            sword.scale.set(1.5, 2, 1.5);
            updateUI();
            showMsg("ARMA FORJADA: " + name);
        } else {
            showMsg("NÚCLEOS INSUFICIENTES!");
        }
    };

    function showMsg(text) {
        const el = document.getElementById('msg');
        el.innerText = text;
        setTimeout(() => el.innerText = "", 2000);
    }

    function updateUI() {
        document.getElementById('hp').innerText = Math.ceil(gameState.hp);
        document.getElementById('cores').innerText = gameState.cores;
        document.getElementById('w-name').innerText = gameState.weaponName;
        document.getElementById('w-dmg').innerText = gameState.damage;
    }

    // INIMIGOS
    function spawnEnemy() {
        const geo = new THREE.OctahedronGeometry(0.7);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff00ff, wireframe: true });
        const mesh = new THREE.Mesh(geo, mat);
        
        const dist = 30;
        const angle = Math.random() * Math.PI * 2;
        mesh.position.set(player.position.x + Math.cos(angle)*dist, 0.7, player.position.z + Math.sin(angle)*dist);
        
        scene.add(mesh);
        gameState.enemies.push({ mesh, hp: 10 + (gameState.cores/2) });
    }

    // LOOP PRINCIPAL
    function animate() {
        if(gameState.hp <= 0) {
            showMsg("CONEXÃO PERDIDA. F5 PARA REINICIAR.");
            return;
        }

        requestAnimationFrame(animate);

        // Movimento
        const speed = 0.15;
        if(keys['KeyW']) player.translateZ(-speed);
        if(keys['KeyS']) player.translateZ(speed);
        if(keys['KeyA']) player.rotation.y += 0.05;
        if(keys['KeyD']) player.rotation.y -= 0.05;

        // Ataque (Automático ao chegar perto ou clique)
        gameState.enemies.forEach((en, i) => {
            const d = player.position.distanceTo(en.mesh.position);
            
            // Perseguição
            en.mesh.lookAt(player.position);
            en.mesh.translateZ(0.06);

            if(d < 2) { // Dano no Jogador
                gameState.hp -= 0.1;
                updateUI();
            }

            if(d < 3.5 && keys['Space']) { // Ataque Jogador
                en.hp -= gameState.damage;
                en.mesh.scale.multiplyScalar(0.9);
                if(en.hp <= 0) {
                    scene.remove(en.mesh);
                    gameState.enemies.splice(i, 1);
                    gameState.cores += 2;
                    updateUI();
                }
            }
        });

        if(Math.random() < 0.02) spawnEnemy();

        // Câmera
        camera.position.lerp(new THREE.Vector3(
            player.position.x - Math.sin(player.rotation.y) * -8,
            player.position.y + 5,
            player.position.z - Math.cos(player.rotation.y) * -8
        ), 0.1);
        camera.lookAt(player.position);
        pointLight.position.copy(player.position);

        renderer.render(scene, camera);
    }

    animate();
    setInterval(updateUI, 500);
</script>
</body>
</html>
