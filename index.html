<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arcade Park - Camera Fix</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
            background: rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 1px solid black; mix-blend-mode: difference;
        }
        #ui-layer {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 30px; box-sizing: border-box; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .stats-container { display: flex; gap: 20px; pointer-events: auto; }
        .stats {
            background: rgba(0,0,0,0.7); color: #ffd700; padding: 10px 20px;
            border-radius: 30px; font-size: 18px; border: 2px solid #ffd700;
        }
        #luck-timer {
            display: none; background: rgba(0, 255, 0, 0.9); color: black; font-weight: bold;
            padding: 10px 20px; border-radius: 15px; margin-top: 15px; border: 2px solid white;
        }
        #setup-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { padding: 15px 30px; font-size: 22px; cursor: pointer; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; }
        #game-info {
            position: absolute; top: 100px; right: 20px; background: rgba(0,0,0,0.8);
            color: white; padding: 20px; border-radius: 15px; display: none; border: 2px solid #00ffff;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1 style="color: #ffd700; font-size: 48px;">ARCADE PARK</h1>
        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <div id="crosshair"></div>
    <div id="ui-layer">
        <div class="stats-container">
            <div class="stats">MOEDAS: <span id="coin-val">0</span></div>
            <div class="stats" style="color: #00ffcc; border-color: #00ffcc;">PRÊMIOS: <span id="prizes-val">10</span></div>
            <div class="stats" style="color: #ff4444; border-color: #ff4444;">TEMPO: <span id="timer-val">0.0</span>s</div>
        </div>
        <div id="luck-timer">SORTE ATIVA: <span id="luck-val">30.0</span>s</div>
    </div>

    <div id="game-info">
        <h2 style="color:#00ffff; margin-top:0">MODO GARRA</h2>
        <ul style="list-style:none; padding:0; line-height: 1.6;">
            <li>Setas: Mover Garra</li>
            <li>Espaço: Pescar</li>
            <li>ESC: Sair da Máquina</li>
        </ul>
    </div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // AMBIENTE
    const skyGeo = new THREE.SphereGeometry(450, 32, 15);
    const skyMat = new THREE.ShaderMaterial({
        uniforms: { topColor: { value: new THREE.Color(0x00aaff) }, bottomColor: { value: new THREE.Color(0xffffff) } },
        vertexShader: `varying vec3 vPos; void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
        fragmentShader: `varying vec3 vPos; uniform vec3 topColor; uniform vec3 bottomColor; void main() { float h = normalize(vPos).y; gl_FragColor = vec4(mix(bottomColor, topColor, max(h, 0.0)), 1.0); }`,
        side: THREE.BackSide
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(50, 100, 50);
    scene.add(sun);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x348C31}));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // MÁQUINA
    const machine = new THREE.Group();
    const mBase = new THREE.Mesh(new THREE.BoxGeometry(4, 1.8, 4), new THREE.MeshStandardMaterial({color:0xcc0000}));
    mBase.position.y = 0.9; machine.add(mBase);
    const mGlass = new THREE.Mesh(new THREE.BoxGeometry(3.8, 4, 3.8), new THREE.MeshStandardMaterial({color:0xffffff, transparent:true, opacity:0.25}));
    mGlass.position.y = 3.8; machine.add(mGlass);

    const panel = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 0.8), new THREE.MeshStandardMaterial({color:0x222}));
    panel.position.set(0, 1.6, 2.1); machine.add(panel);
    
    const clawGroup = new THREE.Group();
    const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,4), new THREE.MeshStandardMaterial({color:0x333}));
    cable.position.y = 2; clawGroup.add(cable);
    const pinchers = [];
    for(let i=0; i<3; i++) {
        const pPivot = new THREE.Group();
        const pMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshStandardMaterial({color:0x999}));
        pMesh.position.set(0, -0.3, 0.2); pPivot.add(pMesh); pPivot.rotation.y = (Math.PI*2/3)*i;
        clawGroup.add(pPivot); pinchers.push(pPivot);
    }
    clawGroup.position.set(0, 5.5, 0); machine.add(clawGroup);

    const prizes = [];
    for(let i=0; i<10; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
        p.position.set(Math.random()*2.8-1.4, 2.1, Math.random()*2.8-1.4);
        machine.add(p); prizes.push(p);
    }
    machine.position.set(0, 0, -12);
    scene.add(machine);

    // MOEDAS
    const coins = [];
    for(let i=0; i<20; i++) {
        const c = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.03), new THREE.MeshStandardMaterial({color:0xffd700}));
        c.position.set(Math.random()*60-30, 0.2, Math.random()*60-30);
        c.rotation.x = Math.PI/2; scene.add(c); coins.push(c);
    }

    let state = "WALK", coinsCount = 0, prizesLeft = 10;
    let yaw = 0, pitch = 0, vY = 0, canJ = true;
    let luckT = 0, isLuck = false, isFish = false, cOpen = 1;
    let sTime = 0, active = false;
    const keys = {};

    window.startGame = () => { document.getElementById('setup-screen').style.display = 'none'; sTime = Date.now(); active = true; };

    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'KeyE') {
            coins.forEach(c => { if(c.visible && camera.position.distanceTo(c.position) < 3) { c.visible = false; coinsCount++; document.getElementById('coin-val').innerText = coinsCount; }});
            
            if(state === "WALK" && camera.position.distanceTo(machine.position) < 5) {
                if(coinsCount > 0) {
                    state = "CLAW"; 
                    document.getElementById('game-info').style.display = 'block';
                    // CÂMERA DE FRENTE PARA A MÁQUINA
                    camera.position.set(0, 4.2, -6.5); 
                    camera.rotation.set(-0.1, Math.PI, 0); 
                }
            }
        }
        if(state === "CLAW" && !isFish) {
            if(e.code === 'ArrowLeft' && clawGroup.position.x > -1.5) clawGroup.position.x -= 0.1;
            if(e.code === 'ArrowRight' && clawGroup.position.x < 1.5) clawGroup.position.x += 0.1;
            if(e.code === 'ArrowUp' && clawGroup.position.z > -1.5) clawGroup.position.z -= 0.1;
            if(e.code === 'ArrowDown' && clawGroup.position.z < 1.5) clawGroup.position.z += 0.1;
            if(e.code === 'Space') startFishing();
            if(e.code === 'Escape') { 
                state = "WALK"; 
                document.getElementById('game-info').style.display = 'none'; 
                camera.position.set(0, 1.7, -6); 
                yaw=0; pitch=0; 
            }
        }
        if(state === "WALK" && e.code === 'Space' && canJ) { vY = 0.22; canJ = false; }
    });
    document.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('mousedown', () => { if(state !== "SETUP") document.body.requestPointerLock(); });
    document.addEventListener('mousemove', e => {
        if(!document.pointerLockElement) return;
        if(state === "WALK") { yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); camera.rotation.set(pitch, yaw, 0, 'YXZ'); }
    });

    function startFishing() {
        isFish = true; let stage = "DOWN", caught = [];
        const itv = setInterval(() => {
            if(stage === "DOWN") { clawGroup.position.y -= 0.05; if(clawGroup.position.y <= 2.5) stage = "GRAB"; }
            else if(stage === "GRAB") { cOpen -= 0.1; if(cOpen <= 0) {
                prizes.forEach(p => { if(p.visible && p.position.distanceTo(new THREE.Vector3(clawGroup.position.x, 2.1, clawGroup.position.z - 12)) < 0.7) caught.push(p); });
                stage = "UP";
            }}
            else if(stage === "UP") { 
                clawGroup.position.y += 0.05; caught.forEach(p => p.position.y = clawGroup.position.y - 0.4); 
                if(clawGroup.position.y >= 5.5) stage = "DONE"; 
            }
            else { caught.forEach(p => { p.visible = false; prizesLeft--; }); document.getElementById('prizes-val').innerText = prizesLeft; coinsCount--; document.getElementById('coin-val').innerText = coinsCount; cOpen = 1; isFish = false; clearInterval(itv); }
        }, 20);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(state === "WALK") {
            vY -= 0.01; camera.position.y += vY;
            if(camera.position.y <= 1.7) { camera.position.y = 1.7; vY = 0; canJ = true; }
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir);
            if(keys['KeyW']) camera.position.addScaledVector(dir, 0.15); if(keys['KeyS']) camera.position.addScaledVector(dir, -0.15);
            if(keys['KeyA']) camera.position.addScaledVector(side, 0.15); if(keys['KeyD']) camera.position.addScaledVector(side, -0.15);
        }
        if(active) document.getElementById('timer-val').innerText = ((Date.now() - sTime)/1000).toFixed(1);
        pinchers.forEach(p => p.rotation.x = 0.8 * (1 - cOpen));
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
